# ============ FILE: frontend/app.yaml ============
# Google App Engine Standard configuration for React frontend
runtime: nodejs18

env: standard

instance_class: F2

automatic_scaling:
  min_instances: 0
  max_instances: 5
  target_cpu_utilization: 0.65

env_variables:
  NODE_ENV: production

handlers:
  - url: /static
    static_dir: dist/static
    secure: always
    redirect_http_response_code: 301

  - url: /assets/(.*)
    static_files: dist/assets/\1
    upload: dist/assets/.*
    secure: always
    redirect_http_response_code: 301

  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
    secure: always
    redirect_http_response_code: 301
    http_headers:
      X-Frame-Options: SAMEORIGIN
      X-Content-Type-Options: nosniff
      Cache-Control: no-cache, no-store, must-revalidate
