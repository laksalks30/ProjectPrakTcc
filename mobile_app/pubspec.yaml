name: obat_lansia_mobile
description: "Aplikasi mobile pengingat minum obat lansia - ObatLansia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # HTTP & API
  http: ^1.3.0

  # State Management
  provider: ^6.1.5

  # Local Storage
  shared_preferences: ^2.5.3

  # Firebase / NoSQL
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.8
  firebase_messaging: ^15.2.7

  # Notifications
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.4.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

